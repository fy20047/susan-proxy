app:
  google-sheet-url: ${GOOGLE_SHEET_URL:}

spring:
  application:
    name: susan
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3308/susan_proxy?characterEncoding=UTF-8&serverTimezone=Asia/Taipei}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      # 為了開發便利使用 update，正式上線改為 none 或 validate
      ddl-auto: update
    # 開啟 SQL log，方便除錯
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

server:
  port: 8080
